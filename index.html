<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日语打卡网页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">

    <!-- 全局状态条 -->
    <div id="globalStudyBar" class="global-study-bar hidden">
      <div>学习时长：<span id="globalStudyTimer">00:00</span></div>
      <div>本次学习已奖励：<span id="globalRewardCount">0</span> 次</div>
    </div>

    <!-- 登录注册页 -->
    <section id="authPage" class="page active">
      <div class="card">
        
        <input type="email" id="email" placeholder="请输入邮箱地址">

        <div class="btn-group">
          <button id="otpModeBtn" onclick="switchAuthMode('otp')">邮箱验证码</button>
          <button id="passwordModeBtn" onclick="switchAuthMode('password')">邮箱+密码</button>
        </div>

        <!-- 验证码登录 -->
        <div id="otpAuthBox">
          <div class="btn-group">
            <button onclick="sendEmailCode()">发送验证码</button>
          </div>

          <input type="text" id="emailCode" placeholder="请输入邮箱验证码">

          <div class="btn-group">
            <button onclick="loginWithCode()">验证码注册 / 登录</button>
          </div>
        </div>

        <!-- 密码登录 -->
        <div id="passwordAuthBox" class="hidden">
          <input type="password" id="password" placeholder="请输入密码">

          <div class="btn-group">
            <button onclick="loginWithEmailPassword()">邮箱+密码登录</button>
          </div>

          <p class="msg">第一次请先用邮箱验证码登录，登录后可设置密码。</p>
        </div>

        <p id="authMsg" class="msg"></p>
      </div>
    </section>

    <!-- 单词书选择页 -->
    <section id="bookPage" class="page">
      <div class="card">
        <h2 class="welcome-title">✨ 欢迎来到 ZNO 的学习空间</h2>
        <p class="welcome-sub">今天也要坚持学习一下吧！</p>
        <p>当前用户：<span id="currentUser"></span></p>
        <p>当前积分：<span id="userPoints">0</span></p>

       <div class="book-list">

  <div class="book-card">
    <div class="book-title">📘 N2单词书</div>
    <div class="book-desc">JLPT N2冲刺阶段</div>
    <button onclick="selectBook('n2')">开始学习</button>
  </div>

  <div class="book-card">
    <div class="book-title">📗 N5基础单词</div>
    <div class="book-desc">日语入门基础</div>
    <button onclick="selectBook('n5')">开始学习</button>
  </div>

  <div class="book-card">
    <div class="book-title">📙 N4常用单词</div>
    <div class="book-desc">进阶常用表达</div>
    <button onclick="selectBook('n4')">开始学习</button>
  </div>

  <div class="book-card">
    <div class="book-title">📒 日常会话</div>
    <div class="book-desc">生活常用表达</div>
    <button onclick="selectBook('daily')">开始学习</button>
  </div>

</div>

        <div class="btn-group">
          <button onclick="goToFavorites()">收藏夹</button>
          <button onclick="logout()">退出登录</button>
        </div>
      </div>
    </section>

    <!-- 学习页 -->
    <section id="studyPage" class="page">
      <div class="card">
        <h2>单词学习</h2>
        <p>单词书：<span id="bookName"></span></p>
        <p>今日已学：<span id="todayCount">0</span> / 100</p>
        <p>当前积分：<span id="studyPoints">0</span></p>
        <p>当前进度：第 <span id="currentWordIndex">1</span> / <span id="totalWordsCount">0</span> 个</p>

        <div class="word-box">
          <div class="word-head">
            <div class="kana-label">假名</div>
            <h3 id="kana">かな</h3>
          </div>

          <div class="word-main">
            <div class="kanji-label">单词</div>
            <h1 id="kanji">漢字</h1>
            <p id="pos" class="pos-text"></p>
          </div>

          <div class="meaning-box">
            <div class="meaning-label">中文意思</div>
            <p id="meaning">中文意思</p>
          </div>

          <div id="exampleSection" class="example-section">
            <div class="example-card">
              <div class="example-title">日语例句</div>
              <p id="exampleJa"></p>
            </div>

            <div class="example-card">
              <div class="example-title">中文翻译</div>
              <p id="exampleZh"></p>
            </div>
          </div>
        </div>

        <div class="btn-group">
          <button onclick="prevWord()">上一个单词</button>
          <button onclick="markLearned()">已学习</button>
          <button onclick="nextWord()">下一个单词</button>
          <button onclick="addToFavorites()">收藏夹</button>
          <button id="voiceBtn" onclick="speakWord()">朗读单词</button>
          <button id="exampleVoiceBtn" onclick="speakExample()">朗读例句</button>
          <button id="wordAndExampleVoiceBtn" onclick="speakWordAndExample()">单词+例句</button>
        </div>

        <div class="btn-group">
          <button onclick="goToReview()">进入复习</button>
          <button onclick="backToBooks()">返回选书</button>
        </div>

        <p id="studyMsg" class="msg"></p>
      </div>
    </section>

    <!-- 复习页 -->
    <section id="reviewPage" class="page">
      <div class="card">
        <h2>复习模式</h2>
        <p>请根据中文意思输入对应日语</p>

        <div class="review-box">
          <h3 id="reviewMeaning">中文意思</h3>
          <input type="text" id="reviewInput" placeholder="请输入日语（假名或汉字）">
        </div>

        <div class="btn-group">
          <button onclick="checkReview()">提交答案</button>
          <button onclick="showAnswer()">查看单词意思</button>
          <button onclick="skipReview()">跳过</button>
          <button onclick="backToStudy()">返回学习</button>
        </div>

        <div id="reviewAnswer" class="answer-box"></div>
        <p id="reviewMsg" class="msg"></p>
      </div>
    </section>

    <!-- 收藏夹页 -->
    <section id="favoritesPage" class="page">
      <div class="card">
        <h2>收藏夹</h2>
        <ul id="favoriteList"></ul>

        <div class="btn-group">
          <button onclick="backToBooks()">返回选书</button>
        </div>
      </div>
    </section>

  </div>

  <!-- 设置密码弹窗 -->
  <div id="passwordModal" class="modal hidden">
    <div class="modal-content">
      <h3>设置登录密码</h3>
      <input type="password" id="modalPassword" placeholder="至少6位密码">
      <div class="btn-group">
        <button onclick="setPasswordFromModal()">保存密码</button>
      </div>
      <p id="modalMsg" class="msg"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
